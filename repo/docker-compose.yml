services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Run Migrations ──────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    command: ["migrate"]
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: ${APP_ENV:-development}
      # config.Load() validates this in any non-test env, so it must be
      # forwarded to migrate / seed one-shot containers as well.
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── Seed Data ───────────────────────────────────────────────────────────────
  seed:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    command: ["seed"]
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: ${APP_ENV:-development}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    volumes:
      - ./deploy/seed:/app/seeds:ro
    depends_on:
      - migrate
    restart: on-failure

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    command: ["server"]
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 8080
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-localhost}
      TLS_CERT_FILE: ${TLS_CERT_FILE:-}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-}
    depends_on:
      - migrate
    volumes:
      - uploads:/app/storage/uploads
      - exports:/app/storage/exports
      - backups:/app/storage/backups
      - lakehouse:/app/storage/lakehouse
      - temp:/app/storage/temp
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    volumes:
      - ./deploy/seed:/app/seeds:ro
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  db_data:
  uploads:
  exports:
  backups:
  lakehouse:
  temp:
